services:
  ndvi-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ndvi-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\""]
      interval: 5s
      timeout: 3s
      retries: 20

  weather-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - weather-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  ndvi-service:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ndvi-db:5432/${POSTGRES_DB}
      PORT: ${NDVI_PORT}
    ports:
      - "${NDVI_PORT}:8081"
    depends_on:
      ndvi-db:
        condition: service_healthy
    restart: unless-stopped

  weather-service:
    build:
      context: .
      dockerfile: Dockerfile.weather
    env_file: .env
    environment:
      MYSQL_DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@weather-db:3306/${MYSQL_DATABASE}
      PORT: ${WEATHER_PORT}
    ports:
      - "${WEATHER_PORT}:8090"
    depends_on:
      weather-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ndvi-db-data:
  weather-db-data:
