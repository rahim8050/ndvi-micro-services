services:
  ndvi-db:
    image: postgres:16
    container_name: ndvi-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ndvi-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  weather-db:
    image: mysql:8.0
    container_name: weather-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - weather-db-data:/var/lib/mysql

  ndvi-service:
    build: .
    container_name: ndvi-service
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ndvi-db:5432/${POSTGRES_DB}
      PORT: ${NDVI_PORT}
    ports:
      - "${NDVI_PORT}:8081"
    depends_on:
      - ndvi-db

  weather-service:
    build:
      context: .
      dockerfile: Dockerfile.weather
    container_name: weather-service
    env_file: .env
    environment:
      MYSQL_DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@weather-db:3306/${MYSQL_DATABASE}
      PORT: ${WEATHER_PORT}
    ports:
      - "${WEATHER_PORT}:8090"
    depends_on:
      - weather-db

volumes:
  ndvi-db-data:
  weather-db-data:
