services:
  db:
    image: postgres:16
    container_name: ndvi-db
    environment:
      POSTGRES_USER: ndvi
      POSTGRES_PASSWORD: ndvi
      POSTGRES_DB: ndvi
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  app:
    build: .
    container_name: ndvi-service
    environment:
      DATABASE_URL: postgres://ndvi:ndvi@db:5432/ndvi
      PORT: 8081
      RUST_LOG: info
      AUTH_DISABLED: "true"
    ports:
      - "${NDVI_PORT:-8082}:8081"
    depends_on:
      - db

volumes:
  db-data:
