name: ndvi-canary-deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. sha or registry tag)"
        required: true
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: ndvi-canary
  cancel-in-progress: true

jobs:
  build_and_test:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      REGISTRY_NAMESPACE: ${{ github.repository_owner }}
      IMAGE_NAME: ndvi-service
      WEATHER_IMAGE_NAME: weather-service
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        run: |
          set -euo pipefail
          docker build -t ndvi-service:${{ steps.vars.outputs.image_tag }} .

      - name: Build weather image
        run: |
          set -euo pipefail
          docker build -f Dockerfile.weather -t weather-service:${{ steps.vars.outputs.image_tag }} .

      - name: Run unit tests
        run: |
          set -euo pipefail
          if [ -f Cargo.toml ]; then
            cargo test --release
          fi

      - name: Upload image to registry
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${REGISTRY_USER:-}" ] || [ -z "${REGISTRY_PASS:-}" ]; then
            echo "registry credentials missing" >&2
            exit 1
          fi
          echo "$REGISTRY_PASS" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin
          image_ref="$REGISTRY/$REGISTRY_NAMESPACE/$IMAGE_NAME:${{ steps.vars.outputs.image_tag }}"
          docker tag ndvi-service:${{ steps.vars.outputs.image_tag }} "$image_ref"
          docker push "$image_ref"
          weather_ref="$REGISTRY/$REGISTRY_NAMESPACE/$WEATHER_IMAGE_NAME:${{ steps.vars.outputs.image_tag }}"
          docker tag weather-service:${{ steps.vars.outputs.image_tag }} "$weather_ref"
          docker push "$weather_ref"

  canary_deploy:
    needs: build_and_test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      REGISTRY: ghcr.io
      REGISTRY_NAMESPACE: ${{ github.repository_owner }}
      IMAGE_NAME: ndvi-service
      WEATHER_IMAGE_NAME: weather-service
      # Optional: override via repository secrets or variables
      CANARY_URL: ${{ secrets.CANARY_URL || '' }}
      PROM_URL: ${{ secrets.PROM_URL || '' }}
      WEATHER_SMOKE_MODE: ${{ vars.WEATHER_SMOKE_MODE || 'health' }}
      WEATHER_SMOKE_PROVIDER: ${{ vars.WEATHER_SMOKE_PROVIDER || 'open_meteo' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${REGISTRY_USER:-}" ] || [ -z "${REGISTRY_PASS:-}" ]; then
            echo "registry credentials missing" >&2
            exit 1
          fi
          echo "$REGISTRY_PASS" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin

      - name: Pull image & deploy canary (10%)
        env:
          IMAGE_TAG: ${{ needs.build_and_test.outputs.image_tag }}
          CANARY_WEIGHT: "10"
        run: |
          set -euo pipefail
          ./scripts/deploy_and_smoke.sh

      - name: Pull weather image & deploy canary (10%)
        env:
          IMAGE_TAG: ${{ needs.build_and_test.outputs.image_tag }}
          IMAGE_NAME: ${{ env.WEATHER_IMAGE_NAME }}
          CANARY_WEIGHT: "10"
          WEATHER_SMOKE_MODE: ${{ env.WEATHER_SMOKE_MODE }}
          WEATHER_SMOKE_PROVIDER: ${{ env.WEATHER_SMOKE_PROVIDER }}
        run: |
          set -euo pipefail
          ./scripts/deploy_and_smoke_weather.sh

      - name: Wait & verify 10% canary
        env:
          IMAGE_TAG: ${{ needs.build_and_test.outputs.image_tag }}
          CANARY_URL: ${{ env.CANARY_URL }}
          PROM_URL: ${{ env.PROM_URL }}
        run: |
          set -euo pipefail
          echo "Waiting for canary warmup..."
          sleep 30

          # Basic health probe (keeps original behavior)
          if [ -n "${CANARY_URL:-}" ]; then
            base="${CANARY_URL%/}"
            echo "Running synthetic checks against ${base}"
            curl -fsS "${base}/healthz" >/dev/null
            payload='{"farm_id":"00000000-0000-0000-0000-000000000001","timestamp":"2025-01-01T00:00:00Z","mean":0.5,"min":0.4,"max":0.6,"source":"canary","geometry":null}'
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "content-type: application/json" \
              -X POST "${base}/api/v1/ndvi" \
              -d "$payload")
            if [ "$http_code" != "201" ]; then
              echo "unexpected status: $http_code" >&2
              exit 1
            fi
          else
            # Fallback to original docker-based check (keeps original functionality)
            docker run --rm --network ndvi-canary curlimages/curl:8.6.0 \
              -fsS http://ndvi-canary-app:8081/healthz >/dev/null
          fi

          # Optional metrics-driven verification (no-op if PROM_URL not set)
          if [ -n "${PROM_URL:-}" ] && [ -x ./scripts/check_metrics.sh ]; then
            echo "Running Prometheus metrics check via scripts/check_metrics.sh"
            ./scripts/check_metrics.sh \
              --prom-url "${PROM_URL}" \
              --service "ndvi-service" \
              --error-threshold 0.01 \
              --p95-threshold-ms 400
          else
            echo "PROM_URL not provided or check_metrics.sh missing; skipping metrics checks"
          fi

      - name: Promote to 50% if healthy
        env:
          IMAGE_TAG: ${{ needs.build_and_test.outputs.image_tag }}
          CANARY_WEIGHT: "50"
        run: |
          set -euo pipefail
          ./scripts/deploy_and_smoke.sh

      - name: Promote weather to 50% if healthy
        env:
          IMAGE_TAG: ${{ needs.build_and_test.outputs.image_tag }}
          IMAGE_NAME: ${{ env.WEATHER_IMAGE_NAME }}
          CANARY_WEIGHT: "50"
          WEATHER_SMOKE_MODE: ${{ env.WEATHER_SMOKE_MODE }}
          WEATHER_SMOKE_PROVIDER: ${{ env.WEATHER_SMOKE_PROVIDER }}
        run: |
          set -euo pipefail
          ./scripts/deploy_and_smoke_weather.sh

      - name: Wait & verify 50% canary
        env:
          CANARY_URL: ${{ env.CANARY_URL }}
          PROM_URL: ${{ env.PROM_URL }}
        run: |
          set -euo pipefail
          echo "Waiting for 50% deploy warmup..."
          sleep 20

          if [ -n "${CANARY_URL:-}" ]; then
            base="${CANARY_URL%/}"
            curl -fsS "${base}/healthz" >/dev/null
          else
            docker run --rm --network ndvi-canary curlimages/curl:8.6.0 \
              -fsS http://ndvi-canary-app:8081/healthz >/dev/null
          fi

          if [ -n "${PROM_URL:-}" ] && [ -x ./scripts/check_metrics.sh ]; then
            ./scripts/check_metrics.sh \
              --prom-url "${PROM_URL}" \
              --service "ndvi-service" \
              --error-threshold 0.01 \
              --p95-threshold-ms 400
          else
            echo "PROM_URL not provided or check_metrics.sh missing; skipping metrics checks"
          fi

      - name: Promote to 100% if healthy
        env:
          IMAGE_TAG: ${{ needs.build_and_test.outputs.image_tag }}
          CANARY_WEIGHT: "100"
        run: |
          set -euo pipefail
          ./scripts/deploy_and_smoke.sh

      - name: Promote weather to 100% if healthy
        env:
          IMAGE_TAG: ${{ needs.build_and_test.outputs.image_tag }}
          IMAGE_NAME: ${{ env.WEATHER_IMAGE_NAME }}
          CANARY_WEIGHT: "100"
          WEATHER_SMOKE_MODE: ${{ env.WEATHER_SMOKE_MODE }}
          WEATHER_SMOKE_PROVIDER: ${{ env.WEATHER_SMOKE_PROVIDER }}
        run: |
          set -euo pipefail
          ./scripts/deploy_and_smoke_weather.sh

      - name: Wait & verify 100% deployment
        env:
          CANARY_URL: ${{ env.CANARY_URL }}
          PROM_URL: ${{ env.PROM_URL }}
        run: |
          set -euo pipefail
          echo "Verifying final deployment..."
          sleep 10
          if [ -n "${CANARY_URL:-}" ]; then
            base="${CANARY_URL%/}"
            curl -fsS "${base}/healthz" >/dev/null
          else
            docker run --rm --network ndvi-canary curlimages/curl:8.6.0 \
              -fsS http://ndvi-canary-app:8081/healthz >/dev/null
          fi

      - name: Rollback on failure (catch-all)
        if: failure()
        run: |
          echo "Rollback: restore previous stable release"
          # NOTE: keep behavior consistent with original; call a rollback script if available
          if [ -x ./scripts/rollback_to_previous.sh ]; then
            ./scripts/rollback_to_previous.sh
          else
            echo "No rollback script found at ./scripts/rollback_to_previous.sh"
          fi

      - name: Cleanup
        if: always()
        run: |
          docker rm -f ndvi-canary-app ndvi-canary-db || true
          docker network rm ndvi-canary || true
