name: ndvi-canary-deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. sha or registry tag)"
        required: true
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: ndvi-canary
  cancel-in-progress: true

jobs:
  build_and_test:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        run: |
          set -euo pipefail
          docker build -t ndvi-service:${{ steps.vars.outputs.image_tag }} .

      - name: Run unit tests
        run: |
          set -euo pipefail
          if [ -f Cargo.toml ]; then
            cargo test --release
          fi

      - name: Upload image to registry
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASS: ${{ secrets.REGISTRY_PASS }}
        run: |
          set -euo pipefail
          if [ -z "${REGISTRY:-}" ] || [ -z "${REGISTRY_USER:-}" ] || [ -z "${REGISTRY_PASS:-}" ]; then
            echo "registry secrets missing" >&2
            exit 1
          fi
          echo "$REGISTRY_PASS" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin
          docker tag ndvi-service:${{ steps.vars.outputs.image_tag }} "$REGISTRY/ndvi-service:${{ steps.vars.outputs.image_tag }}"
          docker push "$REGISTRY/ndvi-service:${{ steps.vars.outputs.image_tag }}"

  canary_deploy:
    needs: build_and_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image & deploy canary (10%)
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          IMAGE_TAG: ${{ needs.build_and_test.outputs.image_tag }}
          CANARY_WEIGHT: "10"
        run: |
          set -euo pipefail
          ./scripts/deploy_and_smoke.sh

      - name: Wait & verify 10% canary
        run: |
          set -euo pipefail
          sleep 30
          curl -fsS http://127.0.0.1:8081/healthz >/dev/null

      - name: Promote to 50% if healthy
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          IMAGE_TAG: ${{ needs.build_and_test.outputs.image_tag }}
          CANARY_WEIGHT: "50"
        run: |
          set -euo pipefail
          ./scripts/deploy_and_smoke.sh

      - name: Promote to 100% if healthy
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          IMAGE_TAG: ${{ needs.build_and_test.outputs.image_tag }}
          CANARY_WEIGHT: "100"
        run: |
          set -euo pipefail
          ./scripts/deploy_and_smoke.sh

      - name: Rollback on failure (catch-all)
        if: failure()
        run: |
          echo "Rollback: restore previous stable release"

      - name: Cleanup
        if: always()
        run: |
          docker rm -f ndvi-canary-app ndvi-canary-db || true
          docker network rm ndvi-canary || true
